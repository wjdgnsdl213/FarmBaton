<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title>공공데이터 7종 → 가치평가 산식 매핑</title>
  <desc>공공데이터 7종이 결정론 산식의 각 항으로 결합되어 인수 검토가 범위가 산출되는 구조</desc>

  <rect width="1280" height="720" fill="#FBFBF8"/>

  <!-- Header -->
  <text x="64" y="72" font-size="14" font-weight="600" fill="#2E9E57" letter-spacing="2.5">공공데이터 · AI 활용</text>
  <text x="63" y="112" font-size="33" font-weight="800" fill="#1B241D" letter-spacing="-1">공공데이터 7종이 하나의 숫자로 결합됩니다</text>
  <text x="65" y="140" font-size="14" font-weight="400" fill="#66706A">나열이 아니라, 각 데이터가 산식의 항(項)으로 들어갑니다</text>
  <text x="1216" y="80" font-size="12.5" font-weight="700" fill="#1F8047" text-anchor="end" letter-spacing="0.3">수치 계산에 LLM 미사용 · 100% 결정론</text>
  <line x1="960" y1="92" x2="1216" y2="92" stroke="#2E9E57" stroke-width="1.5"/>

  <!-- Column labels -->
  <text x="64" y="196" font-size="12" font-weight="700" fill="#9AA49B" letter-spacing="2">공공데이터 7종</text>
  <text x="470" y="196" font-size="12" font-weight="700" fill="#9AA49B" letter-spacing="2">결정론 산식</text>
  <text x="980" y="196" font-size="12" font-weight="700" fill="#9AA49B" letter-spacing="2">산출물</text>

  <!-- ===== LEFT: data sources, hairline grouped ===== -->
  <!-- group 위치·필지 -->
  <text x="64" y="230" font-size="12.5" font-weight="700" fill="#5A6A44">위치 · 필지</text>
  <line x1="64" y1="240" x2="392" y2="240" stroke="#E1E4DB" stroke-width="1"/>
  <g font-size="14.5" font-weight="600" fill="#1B241D">
    <text x="88" y="268">V-World 지오코딩</text><text x="392" y="268" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">국토부</text>
    <text x="88" y="296">법정동코드</text><text x="392" y="296" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">행안부</text>
    <text x="88" y="324">팜맵 · 필지 경계·면적</text><text x="392" y="324" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">농정원</text>
  </g>
  <circle cx="72" cy="263" r="3" fill="#7A8A66"/><circle cx="72" cy="291" r="3" fill="#7A8A66"/><circle cx="72" cy="319" r="3" fill="#7A8A66"/>

  <!-- group 소득·시세 -->
  <text x="64" y="372" font-size="12.5" font-weight="700" fill="#6F8F3A">소득 · 시세</text>
  <line x1="64" y1="382" x2="392" y2="382" stroke="#E1E4DB" stroke-width="1"/>
  <g font-size="14.5" font-weight="600" fill="#1B241D">
    <text x="88" y="410">농산물 소득조사 · 10a당 소득</text><text x="392" y="410" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">농진청</text>
    <text x="88" y="438">KAMIS · 시세·평년가격</text><text x="392" y="438" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">aT</text>
  </g>
  <circle cx="72" cy="405" r="3" fill="#8FAE53"/><circle cx="72" cy="433" r="3" fill="#8FAE53"/>

  <!-- group 토지 지가 -->
  <text x="64" y="486" font-size="12.5" font-weight="700" fill="#1F8047">토지 지가</text>
  <line x1="64" y1="496" x2="392" y2="496" stroke="#E1E4DB" stroke-width="1"/>
  <g font-size="14.5" font-weight="600" fill="#1B241D">
    <text x="88" y="524">개별공시지가 · ㎡당 지가</text><text x="392" y="524" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">국토부</text>
    <text x="88" y="552">토지 실거래가 · 시세 보정</text><text x="392" y="552" font-size="11" font-weight="400" fill="#9AA49B" text-anchor="end">국토부</text>
  </g>
  <circle cx="72" cy="519" r="3" fill="#2E9E57"/><circle cx="72" cy="547" r="3" fill="#2E9E57"/>

  <!-- 농가 입력 (non-public) -->
  <text x="64" y="600" font-size="12.5" font-weight="700" fill="#66706A">＋ 농가 입력 (선택)</text>
  <line x1="64" y1="610" x2="392" y2="610" stroke="#E1E4DB" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="88" y="638" font-size="13.5" font-weight="400" fill="#9AA49B">작목·수령 · 시설 목록 · 매출·판로</text>

  <!-- ===== arrows to formula ===== -->
  <g stroke="#C7CDBF" stroke-width="1.5" fill="none">
    <path d="M 400 290 C 430 290, 435 258, 462 254"/>
    <path d="M 400 420 C 432 420, 436 300, 462 292"/>
    <path d="M 400 530 C 434 530, 438 452, 462 446"/>
    <path d="M 400 625 C 432 625, 438 540, 462 534" stroke-dasharray="4 4"/>
  </g>
  <g fill="#C7CDBF">
    <polygon points="462,254 455.59,258.49 454.57,251.57"/>
    <polygon points="462,292 456.34,297.41 454.28,290.71"/>
    <polygon points="462,446 456.06,451.10 454.36,444.31"/>
    <polygon points="462,534 456.06,539.10 454.36,532.31"/>
  </g>

  <!-- ===== MIDDLE: formula, light hairline blocks ===== -->
  <!-- A 예상 연소득 -->
  <rect x="470" y="222" width="440" height="128" rx="10" fill="#FFFFFF" stroke="#E1E4DB"/>
  <text x="494" y="256" font-size="17" font-weight="800" fill="#1B241D">예상 연소득</text>
  <g font-size="13" font-weight="700">
    <rect x="490" y="272" width="116" height="30" rx="7" fill="#F0F5E2"/><text x="548" y="292" fill="#6F8F3A" text-anchor="middle">10a당 소득</text>
    <text x="614" y="292" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="624" y="272" width="64" height="30" rx="7" fill="#EEF0E6"/><text x="656" y="292" fill="#5A6A44" text-anchor="middle">면적</text>
    <text x="696" y="292" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="706" y="272" width="84" height="30" rx="7" fill="#F1F1EE"/><text x="748" y="292" fill="#66706A" text-anchor="middle">수령계수</text>
    <text x="798" y="292" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="808" y="272" width="80" height="30" rx="7" fill="#F0F5E2"/><text x="848" y="292" fill="#6F8F3A" text-anchor="middle">시세보정</text>
  </g>
  <text x="494" y="332" font-size="11.5" font-weight="400" fill="#9AA49B">수령계수: 사과·복숭아·포도 생육곡선 (DB 기준테이블) · 신뢰등급별 밴드 ±8~25%</text>

  <!-- B 토지 기준가 -->
  <rect x="470" y="366" width="440" height="128" rx="10" fill="#FFFFFF" stroke="#E1E4DB"/>
  <text x="494" y="400" font-size="17" font-weight="800" fill="#1B241D">토지 기준가</text>
  <g font-size="13" font-weight="700">
    <rect x="490" y="416" width="128" height="30" rx="7" fill="#E3F2E8"/><text x="554" y="436" fill="#1F8047" text-anchor="middle">개별공시지가</text>
    <text x="626" y="436" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="636" y="416" width="64" height="30" rx="7" fill="#EEF0E6"/><text x="668" y="436" fill="#5A6A44" text-anchor="middle">면적</text>
    <text x="712" y="436" fill="#9AA49B" text-anchor="middle">→</text>
    <rect x="726" y="416" width="132" height="30" rx="7" fill="#E3F2E8"/><text x="792" y="436" fill="#1F8047" text-anchor="middle">실거래가 보정</text>
  </g>
  <text x="494" y="476" font-size="11.5" font-weight="400" fill="#9AA49B">실거래가 있으면 우선 적용 · 표본 3건 미만이면 신뢰등급 하향</text>

  <!-- C 시설+영업권 (dashed = 농가 입력) -->
  <rect x="470" y="510" width="440" height="140" rx="10" fill="#FFFFFF" stroke="#C9CEC3" stroke-dasharray="5 4"/>
  <text x="494" y="544" font-size="17" font-weight="800" fill="#66706A">시설 잔존가 + 영업권</text>
  <g font-size="13" font-weight="700" fill="#66706A">
    <rect x="490" y="560" width="84" height="30" rx="7" fill="#F1F1EE"/><text x="532" y="580" text-anchor="middle">표준단가</text>
    <text x="582" y="580" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="592" y="560" width="84" height="30" rx="7" fill="#F1F1EE"/><text x="634" y="580" text-anchor="middle">시설 면적</text>
    <text x="684" y="580" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="694" y="560" width="84" height="30" rx="7" fill="#F1F1EE"/><text x="736" y="580" text-anchor="middle">잔존가율</text>
    <text x="786" y="580" fill="#9AA49B" text-anchor="middle">×</text>
    <rect x="796" y="560" width="84" height="30" rx="7" fill="#F1F1EE"/><text x="838" y="580" text-anchor="middle">상태등급</text>
  </g>
  <text x="494" y="616" font-size="11.5" font-weight="400" fill="#9AA49B">농가 입력 기반 — 자료를 낼수록 신뢰등급 상승(C→B)</text>
  <text x="494" y="634" font-size="11.5" font-weight="400" fill="#9AA49B">영업권: 매출 자료 제출 시에만 순소득 기반 보수적 가산(없으면 0)</text>

  <!-- ===== arrows to output ===== -->
  <g stroke="#C7CDBF" stroke-width="1.5" fill="none">
    <path d="M 912 286 C 940 286, 944 340, 968 348"/>
    <path d="M 912 430 C 936 430, 944 400, 968 396"/>
    <path d="M 912 578 C 940 578, 944 460, 968 452"/>
  </g>
  <g fill="#C7CDBF">
    <polygon points="968,348 960.25,349.11 962.47,342.47"/>
    <polygon points="968,396 961.68,400.60 960.53,393.70"/>
    <polygon points="968,452 962.47,457.53 960.25,450.89"/>
  </g>

  <!-- ===== RIGHT: output ===== -->
  <rect x="972" y="222" width="244" height="428" rx="12" fill="#13301C"/>
  <text x="996" y="262" font-size="12" font-weight="700" fill="#A8C66C" letter-spacing="1.5">산출물</text>
  <text x="996" y="300" font-size="23" font-weight="800" fill="#FFFFFF">인수 검토가</text>
  <text x="996" y="330" font-size="23" font-weight="800" fill="#FFFFFF">범위</text>
  <text x="996" y="356" font-size="12" font-weight="400" fill="#C9D6CC">참고용 추정 · min ~ max</text>
  <line x1="996" y1="378" x2="1192" y2="378" stroke="#2C4736" stroke-width="1"/>
  <text x="996" y="406" font-size="13.5" font-weight="700" fill="#FFFFFF">= 토지 + 시설</text>
  <text x="996" y="428" font-size="13.5" font-weight="700" fill="#FFFFFF">　 + 영업권 − 리스크</text>
  <line x1="996" y1="450" x2="1192" y2="450" stroke="#2C4736" stroke-width="1"/>
  <text x="996" y="480" font-size="13.5" font-weight="700" fill="#FFFFFF">예상 연소득 범위</text>
  <text x="996" y="500" font-size="11.5" font-weight="400" fill="#9FB2A4">승계 후 소득 가늠의 기초</text>
  <text x="996" y="540" font-size="12" font-weight="400" fill="#C9D6CC">신뢰등급</text>
  <g font-size="13" font-weight="800" text-anchor="middle">
    <rect x="996" y="550" width="30" height="30" rx="7" fill="#A8C66C"/><text x="1011" y="570" fill="#13301C">A</text>
    <text x="1038" y="570" fill="#6E8574">B</text><text x="1066" y="570" fill="#6E8574">C</text><text x="1094" y="570" fill="#6E8574">D</text>
  </g>
  <text x="996" y="612" font-size="11" font-weight="400" fill="#7E9384">법적 감정평가가 아닌</text>
  <text x="996" y="630" font-size="11" font-weight="400" fill="#7E9384">참고용 추정입니다</text>

  <!-- footer -->
  <text x="64" y="694" font-size="11.5" font-weight="400" fill="#9AA49B">모든 단가·계수는 DB 기준테이블 참조 · 전 외부 API 정적 폴백 구현</text>
</svg>
