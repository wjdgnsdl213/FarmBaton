<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <title>팜바톤 for 지자체 — 승계 모니터링 대시보드 (콘셉트 목업)</title>
  <desc>지자체 구독 상품의 콘셉트 목업. 승계 사각지대 지도, 유치 실적 지표, 지원사업 노출 현황. 예시 데이터.</desc>

  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#15351f" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f6f5f0"/>

  <!-- ===== App header ===== -->
  <rect x="0" y="0" width="1280" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#e3e6dd" stroke-width="1"/>
  <text x="24" y="40" font-size="17" font-weight="800" fill="#15351f">🌾 팜바톤 <tspan fill="#2e9e57">for 지자체</tspan></text>
  <rect x="196" y="20" width="110" height="26" rx="13" fill="#eef0e6"/>
  <text x="251" y="37" font-size="12" font-weight="700" fill="#5a6a44" text-anchor="middle">○○군 농정과</text>
  <rect x="806" y="18" width="140" height="30" rx="15" fill="#fff" stroke="#d8dcd0"/>
  <text x="876" y="37" font-size="12" fill="#5e6a61" text-anchor="middle">기간: 2026 3분기 ▾</text>
  <rect x="958" y="18" width="140" height="30" rx="8" fill="#15351f"/>
  <text x="1028" y="37" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">분기 리포트 PDF ↓</text>
  <rect x="1110" y="18" width="146" height="30" rx="15" fill="#fdf3e3" stroke="#e2b96f"/>
  <text x="1183" y="37" font-size="11" font-weight="700" fill="#8a5a10" text-anchor="middle">콘셉트 목업 · 예시</text>

  <!-- ===== KPI tiles ===== -->
  <g filter="url(#soft)"><rect x="24" y="88" width="296" height="104" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="44" y="116" font-size="11.5" font-weight="700" fill="#9aa49b">승계위험 농장 (추정)</text>
  <text x="44" y="156" font-size="32" font-weight="800" fill="#15351f">214<tspan font-size="15" font-weight="700" fill="#5e6a61"> 곳</tspan></text>
  <text x="44" y="178" font-size="10.5" fill="#9aa49b">70세+ 경영주 · 후계 미확인</text>

  <g filter="url(#soft)"><rect x="336" y="88" width="296" height="104" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="356" y="116" font-size="11.5" font-weight="700" fill="#9aa49b">등록 농장</text>
  <text x="356" y="156" font-size="32" font-weight="800" fill="#15351f">32<tspan font-size="15" font-weight="700" fill="#5e6a61"> 곳</tspan></text>
  <text x="356" y="178" font-size="10.5" fill="#9aa49b">매칭 풀 공개 24곳</text>

  <g filter="url(#soft)"><rect x="648" y="88" width="296" height="104" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="668" y="116" font-size="11.5" font-weight="700" fill="#9aa49b">○○군 희망 청년농</text>
  <text x="668" y="156" font-size="32" font-weight="800" fill="#15351f">47<tspan font-size="15" font-weight="700" fill="#5e6a61"> 명</tspan></text>
  <text x="668" y="178" font-size="10.5" fill="#9aa49b">타 시군 거주 41명 — 유입 수요</text>

  <g filter="url(#soft)"><rect x="960" y="88" width="296" height="104" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="980" y="116" font-size="11.5" font-weight="700" fill="#9aa49b">상담 진행</text>
  <text x="980" y="156" font-size="32" font-weight="800" fill="#15351f">9<tspan font-size="15" font-weight="700" fill="#5e6a61"> 건</tspan></text>
  <text x="980" y="178" font-size="10.5" fill="#9aa49b">승계 성사 2건 · 분기 신규 5건</text>

  <!-- ===== Left: risk map ===== -->
  <g filter="url(#soft)"><rect x="24" y="210" width="700" height="452" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="44" y="242" font-size="15" font-weight="800" fill="#15351f">승계 사각지대 지도</text>
  <text x="704" y="242" font-size="10.5" fill="#9aa49b" text-anchor="end">팜맵 × 농업경영체 × 고령화 통계 (추정)</text>

  <!-- county shape -->
  <path d="M 150 320 C 200 270, 320 255, 400 275 C 480 295, 560 280, 610 330 C 650 370, 640 440, 590 490 C 545 535, 460 545, 390 560 C 320 575, 230 565, 180 515 C 130 465, 110 370, 150 320 Z"
        fill="#eceee6" stroke="#d8dcd0" stroke-width="1.5"/>
  <path d="M 300 268 C 320 350, 300 430, 322 566" fill="none" stroke="#dde1d6" stroke-width="1"/>
  <path d="M 462 286 C 432 370, 472 460, 442 552" fill="none" stroke="#dde1d6" stroke-width="1"/>

  <!-- scattered farms -->
  <g fill="#b7bdb2">
    <circle cx="210" cy="320" r="2"/><circle cx="290" cy="300" r="2"/><circle cx="380" cy="320" r="2"/>
    <circle cx="520" cy="320" r="2"/><circle cx="575" cy="390" r="2"/><circle cx="500" cy="530" r="2"/>
    <circle cx="300" cy="440" r="2"/><circle cx="240" cy="530" r="2"/><circle cx="420" cy="420" r="2"/>
    <circle cx="160" cy="400" r="2"/><circle cx="360" cy="290" r="2"/><circle cx="560" cy="440" r="2"/>
  </g>

  <!-- density blobs (sequential amber, white spacer ring, direct labels) -->
  <circle cx="250" cy="385" r="54" fill="#92400e" fill-opacity="0.88" stroke="#fff" stroke-width="2"/>
  <text x="250" y="382" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">가산면</text>
  <text x="250" y="400" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">58</text>

  <circle cx="470" cy="348" r="46" fill="#d97706" fill-opacity="0.85" stroke="#fff" stroke-width="2"/>
  <text x="470" y="345" font-size="12.5" font-weight="800" fill="#ffffff" text-anchor="middle">월곡면</text>
  <text x="470" y="363" font-size="13.5" font-weight="800" fill="#ffffff" text-anchor="middle">43</text>

  <circle cx="545" cy="472" r="40" fill="#d97706" fill-opacity="0.7" stroke="#fff" stroke-width="2"/>
  <text x="545" y="469" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">오동면</text>
  <text x="545" y="486" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">38</text>

  <circle cx="352" cy="500" r="34" fill="#eaa640" fill-opacity="0.85" stroke="#fff" stroke-width="2"/>
  <text x="352" y="497" font-size="11.5" font-weight="800" fill="#6b3a06" text-anchor="middle">내송면</text>
  <text x="352" y="514" font-size="12.5" font-weight="800" fill="#6b3a06" text-anchor="middle">31</text>

  <circle cx="192" cy="462" r="30" fill="#eaa640" fill-opacity="0.7" stroke="#fff" stroke-width="2"/>
  <text x="192" y="459" font-size="11" font-weight="800" fill="#6b3a06" text-anchor="middle">청림면</text>
  <text x="192" y="475" font-size="12" font-weight="800" fill="#6b3a06" text-anchor="middle">26</text>

  <!-- legend -->
  <rect x="44" y="618" width="13" height="13" rx="3" fill="#eaa640"/>
  <text x="63" y="629" font-size="11" fill="#5e6a61">낮음</text>
  <rect x="98" y="618" width="13" height="13" rx="3" fill="#d97706"/>
  <text x="117" y="629" font-size="11" fill="#5e6a61">중간</text>
  <rect x="152" y="618" width="13" height="13" rx="3" fill="#92400e"/>
  <text x="171" y="629" font-size="11" fill="#5e6a61">높음 — 위험 농장 밀도</text>
  <text x="704" y="629" font-size="10.5" fill="#9aa49b" text-anchor="end">필지 클릭 시 농장 상세·연락 이력</text>

  <!-- ===== Right top: bar chart ===== -->
  <g filter="url(#soft)"><rect x="740" y="210" width="516" height="250" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="760" y="242" font-size="15" font-weight="800" fill="#15351f">읍면별 위험 농장 수 TOP 5</text>

  <text x="826" y="280" font-size="12" fill="#5e6a61" text-anchor="end">가산면</text>
  <path d="M 838 266 L 1124 266 Q 1128 266 1128 270 L 1128 280 Q 1128 284 1124 284 L 838 284 Z" fill="#b45309"/>
  <text x="1136" y="280" font-size="12" font-weight="700" fill="#16241b">58</text>

  <text x="826" y="314" font-size="12" fill="#5e6a61" text-anchor="end">월곡면</text>
  <path d="M 838 300 L 1049 300 Q 1053 300 1053 304 L 1053 314 Q 1053 318 1049 318 L 838 318 Z" fill="#b45309"/>
  <text x="1061" y="314" font-size="12" font-weight="700" fill="#16241b">43</text>

  <text x="826" y="348" font-size="12" fill="#5e6a61" text-anchor="end">오동면</text>
  <path d="M 838 334 L 1024 334 Q 1028 334 1028 338 L 1028 348 Q 1028 352 1024 352 L 838 352 Z" fill="#b45309"/>
  <text x="1036" y="348" font-size="12" font-weight="700" fill="#16241b">38</text>

  <text x="826" y="382" font-size="12" fill="#5e6a61" text-anchor="end">내송면</text>
  <path d="M 838 368 L 989 368 Q 993 368 993 372 L 993 382 Q 993 386 989 386 L 838 386 Z" fill="#b45309"/>
  <text x="1001" y="382" font-size="12" font-weight="700" fill="#16241b">31</text>

  <text x="826" y="416" font-size="12" fill="#5e6a61" text-anchor="end">청림면</text>
  <path d="M 838 402 L 964 402 Q 968 402 968 406 L 968 416 Q 968 420 964 420 L 838 420 Z" fill="#b45309"/>
  <text x="976" y="416" font-size="12" font-weight="700" fill="#16241b">26</text>

  <text x="760" y="444" font-size="10.5" fill="#9aa49b">단위: 곳 · 70세+ 경영주 중 후계 미확인 추정</text>

  <!-- ===== Right bottom: program exposure ===== -->
  <g filter="url(#soft)"><rect x="740" y="476" width="516" height="186" rx="14" fill="#fff" stroke="#e3e6dd"/></g>
  <text x="760" y="508" font-size="15" font-weight="800" fill="#15351f">지원사업 노출 현황</text>

  <text x="760" y="540" font-size="12.5" font-weight="700" fill="#16241b">청년농 스마트팜 시설 지원</text>
  <text x="1236" y="540" font-size="11.5" fill="#5e6a61" text-anchor="end">노출 132 · 신청 6</text>
  <line x1="760" y1="552" x2="1236" y2="552" stroke="#eef0e9" stroke-width="1"/>

  <text x="760" y="576" font-size="12.5" font-weight="700" fill="#16241b">귀농 정착금</text>
  <text x="1236" y="576" font-size="11.5" fill="#5e6a61" text-anchor="end">노출 98 · 신청 4</text>
  <line x1="760" y1="588" x2="1236" y2="588" stroke="#eef0e9" stroke-width="1"/>

  <text x="760" y="612" font-size="12.5" font-weight="700" fill="#16241b">과수원 승계 컨설팅</text>
  <text x="1236" y="612" font-size="11.5" fill="#5e6a61" text-anchor="end">노출 61 · 신청 3</text>
  <line x1="760" y1="624" x2="1236" y2="624" stroke="#eef0e9" stroke-width="1"/>

  <text x="760" y="648" font-size="11" font-weight="700" fill="#1f8047">+ 사업 등록하면 조건 맞는 청년농에게 자동 노출</text>

  <!-- ===== Bottom caption ===== -->
  <text x="24" y="700" font-size="11" fill="#9aa49b">※ 콘셉트 목업 — 예시 데이터이며 실제 서비스 화면이 아닙니다. 지명·수치는 가상입니다.</text>
</svg>
