  <text x="50" y="503" font-size="10" font-weight="700" fill="#c98a4b">운영 테이블</text>
  <rect x="50" y="510" width="115" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="107" y="528" text-anchor="middle" font-size="10" fill="#2c2825">farms</text>
  <rect x="175" y="510" width="130" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="240" y="528" text-anchor="middle" font-size="10" fill="#2c2825">young_farmers</text>
  <rect x="315" y="510" width="105" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="367" y="528" text-anchor="middle" font-size="10" fill="#2c2825">consult_requests</text>

  <text x="50" y="563" font-size="10" font-weight="700" fill="#c98a4b">기준 테이블 · 하드코딩 금지 → DB 참조</text>
  <rect x="50" y="570" width="110" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="105" y="588" text-anchor="middle" font-size="10" fill="#2c2825">facility_std</text>
  <rect x="170" y="570" width="135" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="237" y="588" text-anchor="middle" font-size="10" fill="#2c2825">orchard_age_coef</text>
  <rect x="315" y="570" width="105" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="367" y="588" text-anchor="middle" font-size="10" fill="#2c2825">income_coef</text>

  <text x="50" y="623" font-size="10" fill="#b5aca2">공간 데이터 EPSG:4326 통일 (SHP 5186 → 변환 적재)</text>

  <line x1="42" y1="638" x2="428" y2="638" stroke="#f1d4ad" stroke-width="1"/>
  <text x="50" y="658" font-size="10" font-weight="700" fill="#c98a4b">정적 시드 / 폴백 · 데모 무중단</text>
  <rect x="50" y="665" width="105" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="102" y="683" text-anchor="middle" font-size="10" fill="#2c2825">실거래가 CSV</text>
  <rect x="165" y="665" width="95" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="212" y="683" text-anchor="middle" font-size="10" fill="#2c2825">팜맵 SHP</text>
  <rect x="270" y="665" width="150" height="28" rx="5" fill="#fff" stroke="#fcd5a0" stroke-width="1"/>
  <text x="345" y="683" text-anchor="middle" font-size="10" fill="#2c2825">geocode_fallback.csv</text>
  <text x="50" y="713" font-size="10" fill="#b5aca2">실거래가는 API 호출 금지 · DB 적재본만 사용</text>

  <!-- ── EXTERNAL APIs ── -->
  <rect x="455" y="458" width="415" height="272" rx="12" fill="#f0eaff" stroke="#9b72cf" stroke-width="1.5"/>
  <text x="475" y="482" font-size="11" font-weight="700" fill="#7c4dbb" letter-spacing="1">EXTERNAL APIs · 정적 폴백 보장</text>

  <rect x="475" y="495" width="375" height="62" rx="8" fill="#fff" stroke="#d8c4f0" stroke-width="1.2"/>
  <text x="490" y="517" font-size="12" font-weight="700" fill="#2c2825">V-World</text>
  <text x="490" y="535" font-size="10" fill="#7a6f65">지오코딩 · 공시지가 · 배경지도</text>
  <text x="490" y="550" font-size="10" fill="#9b72cf">🇰🇷 국내 우회 프록시(Pi + Tailscale) 경유</text>

  <rect x="475" y="567" width="375" height="46" rx="8" fill="#fff" stroke="#d8c4f0" stroke-width="1.2"/>
  <text x="490" y="589" font-size="12" font-weight="700" fill="#2c2825">KAMIS</text>
  <text x="490" y="605" font-size="10" fill="#7a6f65">과수 도매 시세 → 가치평가 시세보정</text>

  <rect x="475" y="623" width="375" height="46" rx="8" fill="#fff" stroke="#d8c4f0" stroke-width="1.2"/>
  <text x="490" y="645" font-size="12" font-weight="700" fill="#2c2825">팜맵 (data.go.kr · B552895)</text>
  <text x="490" y="661" font-size="10" fill="#7a6f65">필지 · 경지 정보 적재</text>

  <rect x="475" y="679" width="375" height="46" rx="8" fill="#fff" stroke="#d8c4f0" stroke-width="1.2"/>
  <text x="490" y="701" font-size="12" font-weight="700" fill="#2c2825">Claude API</text>
  <text x="490" y="717" font-size="10" fill="#7a6f65">리포트 설명문 생성 전용 · 수치 계산 미사용</text>
</svg>
