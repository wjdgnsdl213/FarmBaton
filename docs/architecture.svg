  <line x1="703" y1="444" x2="703" y2="478" stroke="#9aa39a" stroke-width="1.6"/>
  <polygon points="698,475 708,475 703,483" fill="#9aa39a"/>
  <text x="560" y="465" font-size="10.5" fill="#7a8278">외부 호출 · 정적 폴백</text>

  <!-- ===== DATA panel ===== -->
  <g filter="url(#sh)">
    <rect x="28" y="486" width="430" height="222" rx="12" fill="#fff" stroke="#e7e7e1"/>
  </g>
  <rect x="28" y="486" width="6" height="222" rx="3" fill="#c98a2e"/>
  <text x="48" y="512" font-size="12.5" font-weight="800" fill="#b5791f">🗄  DATA · Supabase (PostgreSQL + PostGIS)</text>

  <text x="48" y="536" font-size="10" font-weight="700" fill="#c98a2e">운영 테이블</text>
  <g font-size="10" fill="#243027" text-anchor="middle">
    <rect x="48" y="542" width="110" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="103" y="559">farms</text>
    <rect x="166" y="542" width="135" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="233" y="559">young_farmers</text>
    <rect x="309" y="542" width="135" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="376" y="559">consult_requests</text>
  </g>

  <text x="48" y="592" font-size="10" font-weight="700" fill="#c98a2e">기준 테이블  ·  하드코딩 금지 → DB 참조</text>
  <g font-size="10" fill="#243027" text-anchor="middle">
    <rect x="48" y="598" width="105" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="100" y="615">facility_std</text>
    <rect x="161" y="598" width="145" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="233" y="615">orchard_age_coef</text>
    <rect x="314" y="598" width="120" height="26" rx="6" fill="#fdf6e9" stroke="#f0d8ab"/><text x="374" y="615">income_coef</text>
  </g>
  <text x="48" y="644" font-size="9.5" fill="#a59a87">공간 데이터 EPSG:4326 통일 (SHP 5186 → 변환 적재)</text>

  <line x1="40" y1="656" x2="446" y2="656" stroke="#f0e4cb" stroke-width="1"/>
  <text x="48" y="676" font-size="10" font-weight="700" fill="#c98a2e">정적 시드 / 폴백  ·  데모 무중단</text>
  <g font-size="10" fill="#243027" text-anchor="middle">
    <rect x="48" y="682" width="110" height="22" rx="6" fill="#f7f8f4" stroke="#dfe1d8"/><text x="103" y="697">실거래가 CSV</text>
    <rect x="166" y="682" width="100" height="22" rx="6" fill="#f7f8f4" stroke="#dfe1d8"/><text x="216" y="697">팜맵 SHP</text>
    <rect x="274" y="682" width="170" height="22" rx="6" fill="#f7f8f4" stroke="#dfe1d8"/><text x="359" y="697">geocode_fallback.csv</text>
  </g>

  <!-- ===== EXTERNAL panel ===== -->
  <g filter="url(#sh)">
    <rect x="474" y="486" width="458" height="222" rx="12" fill="#fff" stroke="#e7e7e1"/>
  </g>
  <rect x="474" y="486" width="6" height="222" rx="3" fill="#5b6b7a"/>
  <text x="494" y="512" font-size="12.5" font-weight="800" fill="#4a5a69">🔌  EXTERNAL APIs · 정적 폴백 보장</text>

  <rect x="494" y="524" width="418" height="54" rx="9" fill="#f1f4f6" stroke="#d5dde3"/>
  <text x="510" y="545" font-size="12" font-weight="700" fill="#243027">🌐 V-World</text>
  <text x="510" y="562" font-size="9.5" fill="#7a8278">지오코딩 · 공시지가 · 배경지도</text>
  <text x="700" y="545" font-size="9.5" font-weight="700" fill="#5b6b7a">🇰🇷 국내 우회 프록시</text>
  <text x="700" y="562" font-size="9.5" fill="#7a8278">Pi + Tailscale Funnel 경유</text>

  <rect x="494" y="586" width="418" height="36" rx="9" fill="#f1f4f6" stroke="#d5dde3"/>
  <text x="510" y="609" font-size="11.5" font-weight="700" fill="#243027">📈 KAMIS</text>
  <text x="610" y="609" font-size="9.5" fill="#7a8278">과수 도매 시세 → 가치평가 시세보정</text>

  <rect x="494" y="630" width="418" height="36" rx="9" fill="#f1f4f6" stroke="#d5dde3"/>
  <text x="510" y="653" font-size="11.5" font-weight="700" fill="#243027">🗂 팜맵</text>
  <text x="610" y="653" font-size="9.5" fill="#7a8278">data.go.kr · B552895 — 필지/경지 정보 적재</text>

  <rect x="494" y="674" width="418" height="34" rx="9" fill="#f1f4f6" stroke="#d5dde3"/>
  <text x="510" y="696" font-size="11.5" font-weight="700" fill="#243027">🤖 Claude API</text>
  <text x="610" y="696" font-size="9.5" fill="#7a8278">리포트 설명문 생성 전용 · 수치 계산 미사용</text>
</svg>
