  <rect x="30" y="210" width="840" height="208" rx="12" fill="#edf7f0" stroke="#52b788" stroke-width="1.5"/>
  <text x="50" y="234" font-size="11" font-weight="700" fill="#52b788" letter-spacing="1">BACKEND · FastAPI · Railway</text>

  <text x="50" y="255" font-size="10" font-weight="700" fill="#7a9c87">API 라우터</text>
  <rect x="50" y="262" width="185" height="56" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="142" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">/api/farms</text>
  <text x="142" y="303" text-anchor="middle" font-size="9.5" fill="#7a6f65">등록 · 카드 · 리포트 · PDF</text>

  <rect x="255" y="262" width="185" height="56" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="347" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">/api/young-farmers</text>
  <text x="347" y="303" text-anchor="middle" font-size="9.5" fill="#7a6f65">프로필 · 매칭</text>

  <rect x="460" y="262" width="185" height="56" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="552" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">/api/auth</text>
  <text x="552" y="303" text-anchor="middle" font-size="9.5" fill="#7a6f65">로그인 · JWT</text>

  <rect x="665" y="262" width="185" height="56" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="757" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">/api/conversations</text>
  <text x="757" y="303" text-anchor="middle" font-size="9.5" fill="#7a6f65">상담 채팅</text>

  <text x="50" y="340" font-size="10" font-weight="700" fill="#7a9c87">서비스 계층 · 🔒 수치는 결정론적 Python · LLM은 설명문 생성 전용</text>
  <rect x="50" y="348" width="253" height="58" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="176" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">🔒 valuation.py</text>
  <text x="176" y="391" text-anchor="middle" font-size="9.5" fill="#7a6f65">소득 · 시설 잔존가 · 검토가 범위</text>

  <rect x="323" y="348" width="253" height="58" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="449" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">🔒 매칭 엔진</text>
  <text x="449" y="391" text-anchor="middle" font-size="9.5" fill="#7a6f65">조건 기반 결정론적 점수</text>

  <rect x="596" y="348" width="253" height="58" rx="8" fill="#fff" stroke="#b7e4c7" stroke-width="1.2"/>
  <text x="722" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">report_ai · pdf_render</text>
  <text x="722" y="391" text-anchor="middle" font-size="9.5" fill="#7a6f65">✍️ 설명문(Claude) · 📄 PDF(Playwright)</text>

  <!-- Arrows Backend → Data / External -->
  <line x1="235" y1="418" x2="235" y2="452" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="230,449 240,449 235,457" fill="#94a3b8"/>
