<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <title>팜바톤 시스템 아키텍처</title>
  <desc>고령 농가 승계 진단·매칭 플랫폼의 전체 시스템 구조도</desc>

  <!-- Background -->
  <rect width="900" height="760" fill="#faf9f7" rx="16"/>

  <!-- ── FRONTEND ── -->
  <rect x="30" y="20" width="840" height="150" rx="12" fill="#eef4fb" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="50" y="44" font-size="11" font-weight="700" fill="#5b9bd5" letter-spacing="1">FRONTEND · React + Vite + Leaflet · Vercel</text>

  <rect x="50" y="58" width="185" height="104" rx="8" fill="#fff" stroke="#c8ddf0" stroke-width="1.2"/>
  <text x="142" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">LandingPage</text>
  <text x="142" y="103" text-anchor="middle" font-size="10" fill="#7a6f65">인트로 애니메이션</text>
  <text x="142" y="120" text-anchor="middle" font-size="10" fill="#7a6f65">서비스 소개 · CTA</text>

  <rect x="255" y="58" width="185" height="104" rx="8" fill="#fff" stroke="#c8ddf0" stroke-width="1.2"/>
  <text x="347" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">농가 플로우</text>
  <text x="347" y="103" text-anchor="middle" font-size="10" fill="#7a6f65">농장 등록</text>
  <text x="347" y="120" text-anchor="middle" font-size="10" fill="#7a6f65">인수 검토 리포트 · PDF</text>

  <rect x="460" y="58" width="185" height="104" rx="8" fill="#fff" stroke="#c8ddf0" stroke-width="1.2"/>
  <text x="552" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">청년농 플로우</text>
  <text x="552" y="103" text-anchor="middle" font-size="10" fill="#7a6f65">프로필 등록</text>
  <text x="552" y="120" text-anchor="middle" font-size="10" fill="#7a6f65">조건 기반 매칭 리스트</text>

  <rect x="665" y="58" width="185" height="104" rx="8" fill="#fff" stroke="#c8ddf0" stroke-width="1.2"/>
  <text x="757" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2825">지도 뷰</text>
  <text x="757" y="103" text-anchor="middle" font-size="10" fill="#7a6f65">Leaflet 필지 표시</text>
  <text x="757" y="120" text-anchor="middle" font-size="10" fill="#7a6f65">V-World 배경지도</text>

  <!-- Arrow: Frontend → Backend -->
  <line x1="450" y1="170" x2="450" y2="203" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="445,200 455,200 450,208" fill="#94a3b8"/>
  <text x="460" y="190" font-size="10" fill="#94a3b8">REST /api · JWT 인증</text>

