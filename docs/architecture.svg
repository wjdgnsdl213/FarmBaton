  <line x1="662" y1="418" x2="662" y2="452" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="657,449 667,449 662,457" fill="#94a3b8"/>
  <text x="675" y="440" font-size="10" fill="#94a3b8">외부 호출 · 정적 폴백</text>

