<svg viewBox="0 0 960 736" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <title>팜바톤 시스템 아키텍처</title>
  <desc>고령 농가 승계 진단·매칭 플랫폼의 전체 시스템 구조도</desc>

  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f3d2b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="736" fill="#f6f7f4"/>

  <!-- Header -->
  <text x="32" y="42" font-size="22" font-weight="800" fill="#1f3d2b">🌾 팜바톤 · 시스템 아키텍처</text>
  <text x="34" y="66" font-size="12" fill="#6b7565">고령 농가의 농장을 청년농에게 잇는 승계 진단·매칭 플랫폼</text>
  <text x="34" y="88" font-size="11.5" fill="#3f5a48">
    <tspan font-weight="700" fill="#2f7d4f">①  농가</tspan>  농장 등록 → 인수 검토 리포트      <tspan font-weight="700" fill="#2f7d4f">②  청년농</tspan>  프로필 → 매칭 리스트
  </text>
  <line x1="32" y1="104" x2="928" y2="104" stroke="#e2e4dd" stroke-width="1"/>

  <!-- ===== FRONTEND tab ===== -->
  <rect x="28" y="124" width="40" height="120" rx="10" fill="#3b82a8"/>
  <text transform="rotate(-90 48 184)" x="48" y="184" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" letter-spacing="2">FRONTEND</text>

  <!-- FE cards -->
  <g filter="url(#sh)">
    <rect x="84" y="124" width="200" height="92" rx="10" fill="#fff" stroke="#e7e7e1"/>
    <rect x="300" y="124" width="200" height="92" rx="10" fill="#fff" stroke="#e7e7e1"/>
    <rect x="516" y="124" width="200" height="92" rx="10" fill="#fff" stroke="#e7e7e1"/>
    <rect x="732" y="124" width="200" height="92" rx="10" fill="#fff" stroke="#e7e7e1"/>
  </g>
  <rect x="84" y="124" width="5" height="92" rx="2" fill="#3b82a8"/>
  <rect x="300" y="124" width="5" height="92" rx="2" fill="#3b82a8"/>
  <rect x="516" y="124" width="5" height="92" rx="2" fill="#3b82a8"/>
  <rect x="732" y="124" width="5" height="92" rx="2" fill="#3b82a8"/>
  <text x="104" y="153" font-size="13" font-weight="700" fill="#243027">🏠 LandingPage</text>
  <text x="104" y="176" font-size="10.5" fill="#7a8278">인트로 애니메이션</text>
  <text x="104" y="194" font-size="10.5" fill="#7a8278">서비스 소개 · CTA</text>
  <text x="320" y="153" font-size="13" font-weight="700" fill="#243027">🌾 농가 플로우</text>
  <text x="320" y="176" font-size="10.5" fill="#7a8278">농장 등록</text>
  <text x="320" y="194" font-size="10.5" fill="#7a8278">인수 검토 리포트 · PDF</text>
  <text x="536" y="153" font-size="13" font-weight="700" fill="#243027">🧑‍🌾 청년농 플로우</text>
  <text x="536" y="176" font-size="10.5" fill="#7a8278">프로필 등록</text>
  <text x="536" y="194" font-size="10.5" fill="#7a8278">조건 기반 매칭 리스트</text>
  <text x="752" y="153" font-size="13" font-weight="700" fill="#243027">🗺 지도 뷰</text>
  <text x="752" y="176" font-size="10.5" fill="#7a8278">Leaflet 필지 표시</text>
  <text x="752" y="194" font-size="10.5" fill="#7a8278">V-World 배경지도</text>

  <!-- FE -> BE -->
  <line x1="508" y1="216" x2="508" y2="250" stroke="#9aa39a" stroke-width="1.6"/>
  <polygon points="503,247 513,247 508,255" fill="#9aa39a"/>
  <text x="520" y="237" font-size="10.5" fill="#7a8278">REST API · JWT 인증</text>

  <!-- ===== BACKEND tab ===== -->
  <rect x="28" y="258" width="40" height="186" rx="10" fill="#2f7d4f"/>
  <text transform="rotate(-90 48 351)" x="48" y="351" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" letter-spacing="2">BACKEND</text>

  <!-- BE outer panel -->
  <g filter="url(#sh)">
    <rect x="84" y="258" width="848" height="186" rx="12" fill="#fff" stroke="#e7e7e1"/>
  </g>
  <text x="104" y="282" font-size="12.5" font-weight="800" fill="#2f7d4f">FastAPI · Railway</text>
  <text x="104" y="300" font-size="10" font-weight="700" fill="#9aa39a" letter-spacing="0.5">API 라우터</text>

  <!-- router pills -->
  <g font-size="11.5" font-weight="700" fill="#2f7d4f" text-anchor="middle">
    <rect x="104" y="308" width="195" height="38" rx="19" fill="#eaf4ee" stroke="#bcdcc7"/>
    <text x="201" y="332">/api/farms</text>
    <rect x="314" y="308" width="195" height="38" rx="19" fill="#eaf4ee" stroke="#bcdcc7"/>
    <text x="411" y="332">/api/young-farmers</text>
    <rect x="524" y="308" width="195" height="38" rx="19" fill="#eaf4ee" stroke="#bcdcc7"/>
    <text x="621" y="332">/api/auth</text>
    <rect x="734" y="308" width="178" height="38" rx="19" fill="#eaf4ee" stroke="#bcdcc7"/>
    <text x="823" y="332">/api/conversations</text>
  </g>

  <text x="104" y="372" font-size="10" font-weight="700" fill="#9aa39a">서비스 계층  ·  🔒 수치 계산은 결정론적 Python (LLM은 설명문 생성에만 사용)</text>

  <!-- service cards -->
  <rect x="104" y="380" width="262" height="54" rx="9" fill="#f3f8f4" stroke="#cfe6d6"/>
  <text x="120" y="403" font-size="12" font-weight="700" fill="#243027">🔒 valuation.py</text>
  <text x="120" y="421" font-size="10" fill="#7a8278">소득 · 시설 잔존가 · 검토가 범위</text>
  <rect x="377" y="380" width="262" height="54" rx="9" fill="#f3f8f4" stroke="#cfe6d6"/>
  <text x="393" y="403" font-size="12" font-weight="700" fill="#243027">🔒 매칭 엔진</text>
  <text x="393" y="421" font-size="10" fill="#7a8278">조건 기반 결정론적 점수</text>
  <rect x="650" y="380" width="262" height="54" rx="9" fill="#f3f8f4" stroke="#cfe6d6"/>
  <text x="666" y="403" font-size="12" font-weight="700" fill="#243027">report_ai · pdf_render</text>
  <text x="666" y="421" font-size="10" fill="#7a8278">✍️ 설명문(Claude) · 📄 PDF(Playwright)</text>

  <!-- BE -> DATA / EXTERNAL -->
  <line x1="243" y1="444" x2="243" y2="478" stroke="#9aa39a" stroke-width="1.6"/>
  <polygon points="238,475 248,475 243,483" fill="#9aa39a"/>
